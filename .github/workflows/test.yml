name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          find src tests -type f \( -name '*.c' -o -name '*.h' \) \
              -not -path '*/build/*' -not -path '*/obj/*' \
              -exec clang-format --dry-run -Werror {} +
          clang-format --dry-run -Werror uUR.c

  pc:
    name: PC build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build library
        run: make all

      - name: Run all tests
        run: make test

  esp-idf:
    name: ESP-IDF component build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build smoke-test app for esp32
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          path: 'tests/esp-idf-smoke'
