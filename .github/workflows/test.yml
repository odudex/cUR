name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pc:
    name: PC build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build library
        run: make all

      - name: Run all tests
        run: make test

  # TODO: add an esp-idf job once a minimal smoke-test app exists under
  # tests/esp-idf-smoke/. Use espressif/esp-idf-ci-action@v1 with that path.
